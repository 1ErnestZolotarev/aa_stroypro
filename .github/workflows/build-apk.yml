name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # можно запускать вручную на вкладке Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'   # укажите вашу версию Flutter

      - name: Write secret files
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Sign APK
        run: |
          # Если у вас есть keystore, добавьте его в репозиторий как секрет или файл
          # Здесь предполагается, что keystore лежит в android/app/aa-stroypro-key.jks
          # Если keystore нет, удалите этот шаг и используйте дебажный ключ (только для теста)
          echo "Если нужен подписанный APK, добавьте шаг подписи"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
