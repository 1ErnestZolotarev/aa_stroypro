workflows:
  release-build:
    name: Diagnostic Build
    environment:
      flutter: stable
    scripts:
      - flutter build apk --debug || true
      - echo "=== Содержимое \$FCI_BUILD_DIR ==="
      - ls -la \$FCI_BUILD_DIR || true
      - echo "=== Дерево build ==="
      - find \$FCI_BUILD_DIR -name "*.apk" || true
      - echo "=== Поиск APK по всей системе ==="
      - find / -name "*.apk" 2>/dev/null | head -20 || true
    artifacts:
      - "*.apk"
