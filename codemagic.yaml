workflows:
  release-build:
    name: Debug Build with Full Log
    environment:
      flutter: stable
    scripts:
      - flutter build apk --debug 2>&1 | tee build.log
      - echo "=== Содержимое build.log (последние 80 строк) ==="
      - tail -80 build.log
    artifacts:
      - build.log
      - build/app/outputs/flutter-apk/app-debug.apk
